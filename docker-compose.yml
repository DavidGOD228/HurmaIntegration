services:

  # ── Shared PostgreSQL ────────────────────────────────────────────────────────
  # One instance, two databases (hurma_recorder + worklog_dashboard).
  # init.sql creates worklog_dashboard; hurma_recorder is created by POSTGRES_DB.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hurma_recorder
      POSTGRES_USER:     hurma_recorder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hurma_recorder"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  # ── DB migrations ────────────────────────────────────────────────────────────
  # Run once on first deploy:
  #   docker compose --profile migrate run --rm migrate-hurma-recorder
  #   docker compose --profile migrate run --rm migrate-worklog

  migrate-hurma-recorder:
    profiles: [migrate]
    build: ./hurma-recorder
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgres://hurma_recorder:${POSTGRES_PASSWORD}@postgres:5432/hurma_recorder
    command: ["node", "src/db/migrate.js"]

  migrate-worklog:
    profiles: [migrate]
    build: ./worklog-dashboard
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgres://hurma_recorder:${POSTGRES_PASSWORD}@postgres:5432/worklog_dashboard
    command: ["node", "src/db/migrate.js"]

  # ── hurma-recorder ───────────────────────────────────────────────────────────
  # Fireflies → Hurma integration + Chrome extension backend
  # Domain: https://hurmarecorder.development-test.website
  hurma-recorder:
    build: ./hurma-recorder
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      PORT:         ${HURMA_RECORDER_PORT:-3000}
      NODE_ENV:     production
      DATABASE_URL: postgres://hurma_recorder:${POSTGRES_PASSWORD}@postgres:5432/hurma_recorder
    ports:
      - "127.0.0.1:${HURMA_RECORDER_PORT:-3000}:${HURMA_RECORDER_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${HURMA_RECORDER_PORT:-3000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── worklog-dashboard ────────────────────────────────────────────────────────
  # Hurma vs Redmine worklog comparison dashboard
  # Domain: https://worklog-dashboard.development-test.website
  worklog-dashboard:
    build: ./worklog-dashboard
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      PORT:                       ${WORKLOG_PORT:-3200}
      NODE_ENV:                   production
      DATABASE_URL:               postgres://hurma_recorder:${POSTGRES_PASSWORD}@postgres:5432/worklog_dashboard
      HURMA_BASE_URL:             ${HURMA_BASE_URL}
      HURMA_API_TOKEN:            ${WORKLOG_HURMA_API_TOKEN:-${HURMA_API_TOKEN}}
      HURMA_HR_API_VERSION:       ${HURMA_HR_API_VERSION:-v1}
      REDMINE_BASE_URL:           ${REDMINE_BASE_URL}
      REDMINE_API_KEY:            ${REDMINE_API_KEY}
      ADMIN_USERNAME:             ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:             ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      DEFAULT_WORK_HOURS_PER_DAY: ${DEFAULT_WORK_HOURS_PER_DAY:-8}
      OK_DELTA_THRESHOLD_HOURS:   ${OK_DELTA_THRESHOLD_HOURS:-0.5}
      DEFAULT_TIMEZONE:           ${DEFAULT_TIMEZONE:-Europe/Kiev}
    ports:
      - "127.0.0.1:${WORKLOG_PORT:-3200}:${WORKLOG_PORT:-3200}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${WORKLOG_PORT:-3200}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── mirko-redmine ─────────────────────────────────────────────────────────────
  # Thin proxy / REST API wrapper around https://project.mirko.in.ua
  mirko-redmine:
    build: ./mirko-redmine
    restart: unless-stopped
    env_file: .env
    environment:
      PORT:             ${MIRKO_REDMINE_PORT:-3100}
      REDMINE_BASE_URL: ${REDMINE_BASE_URL:-https://project.mirko.in.ua}
      REDMINE_API_KEY:  ${REDMINE_API_KEY}
    ports:
      - "127.0.0.1:${MIRKO_REDMINE_PORT:-3100}:${MIRKO_REDMINE_PORT:-3100}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${MIRKO_REDMINE_PORT:-3100}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
